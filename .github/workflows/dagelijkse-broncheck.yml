name: Dagelijkse BCJN-broncheck

on:
  workflow_dispatch:
  schedule:
    - cron: "31 6,13 * * 1-5"
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  broncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: dagelijkse-bcjn-broncheck
      cancel-in-progress: false

    steps:
      - name: Website ophalen
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bepalen of broncheck nodig is
        id: check_request
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_SCHEDULE: ${{ github.event.schedule }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: bcjn_state
          SUPABASE_STATE_ID: bcjn-zomer-2026
        run: node website-bestanden/scripts/source-check-request.js decide

      - name: Agenda's controleren
        if: steps.check_request.outputs.should_run == 'true'
        run: node website-bestanden/scripts/update-offers.js

      - name: Broncheckdata bewaren
        if: steps.check_request.outputs.should_run == 'true'
        run: |
          if git diff --quiet -- website-bestanden/data/offers_pending_review.json website-bestanden/data/zomerprogramma_data.json; then
            echo "Geen broncheckdata gewijzigd."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website-bestanden/data/offers_pending_review.json website-bestanden/data/zomerprogramma_data.json
          git commit -m "Werk UIT-agenda broncheckdata bij"
          git push

      - name: Automatische agenda publiceren
        if: steps.check_request.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: bcjn_state
          SUPABASE_STATE_ID: bcjn-zomer-2026
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "Supabase secrets ontbreken; broncheckdata is wel bijgewerkt."
            exit 0
          fi

          node website-bestanden/scripts/publish-auto-agenda-items.js

      - name: Broncheckverzoek afronden
        if: always() && steps.check_request.outputs.reason == 'siteverzoek'
        env:
          CHECK_STATUS: ${{ job.status }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_TABLE: bcjn_state
          SUPABASE_STATE_ID: bcjn-zomer-2026
        run: node website-bestanden/scripts/source-check-request.js finish
